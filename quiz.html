<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste de Talento em Tecnologia | Cyber-Nexis</title>

  <link rel="stylesheet" href="Styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo-cyber">
      <img src="Imagem/Logotipo.jpg" alt="Logotipo Cyber-Nexis">
    </div>
  </div>
</header>

<main class="container quiz-container">

  <section class="section">

    <h1 class="quiz-main-title">Teste seu talento em tecnologia</h1>

    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="timer">
      Tempo restante: <span id="time">60</span> segundos
    </div>

    <form id="quiz-form">

      <div class="step">
        <h2>ETAPA 01</h2>

        <p>1) Quando você acessa um site HTTPS, o que garante a criptografia?</p>
        <label><input type="radio" name="q1" value="DNS"> DNS</label>
        <label><input type="radio" name="q1" value="TLS"> TLS + Certificado Digital</label>
        <label><input type="radio" name="q1" value="Firewall"> Firewall</label>
        <label><input type="radio" name="q1" value="Roteador"> Roteador</label>

        <p>2) O que ocorre primeiro ao acessar um domínio?</p>
        <label><input type="radio" name="q2" value="IP"> Resolução DNS</label>
        <label><input type="radio" name="q2" value="HTML"> Download HTML</label>
        <label><input type="radio" name="q2" value="Firewall"> Validação Firewall</label>
        <label><input type="radio" name="q2" value="Ping"> Ping automático</label>

        <button type="button" class="next">Próximo</button>
      </div>

      <div class="step" style="display:none;">
        <h2>ETAPA 02</h2>

        <p>3) O que caracteriza força bruta?</p>
        <label><input type="radio" name="q3" value="ZeroDay"> Zero Day</label>
        <label><input type="radio" name="q3" value="Senha"> Tentativas massivas de senha</label>
        <label><input type="radio" name="q3" value="Fisico"> Ataque físico</label>
        <label><input type="radio" name="q3" value="Malware"> Malware automático</label>

        <button type="button" class="prev">Voltar</button>
        <button type="button" class="next">Próximo</button>
      </div>

      <div class="step" style="display:none;">
        <h2>ETAPA FINAL</h2>

        <p>4) Vulnerabilidade descoberta. Ação correta?</p>
        <label><input type="radio" name="q4" value="Explorar"> Explorar</label>
        <label><input type="radio" name="q4" value="Publicar"> Publicar</label>
        <label><input type="radio" name="q4" value="Reportar"> Reportar responsável</label>
        <label><input type="radio" name="q4" value="Ignorar"> Ignorar</label>

        <button type="button" class="prev">Voltar</button>
        <button type="button" id="finalizar">Finalizar</button>
      </div>

    </form>

    <div id="resultado" style="display:none;">
      <h3 id="pontuacao"></h3>

      <form id="email-form">
        <input type="text" id="nome" placeholder="Seu nome" required><br><br>
        <input type="email" id="email" placeholder="Seu email" required><br><br>
        <button type="submit">Enviar Resultado</button>
      </form>

      <p id="status"></p>
    </div>

  </section>

</main>

<script>
document.addEventListener('DOMContentLoaded', () => {

  emailjs.init('_wMmR0Rqn5VoasHqR');

  const steps = document.querySelectorAll('.step');
  const progressBar = document.getElementById('progress-bar');
  const timeEl = document.getElementById('time');
  const resultado = document.getElementById('resultado');
  const pontuacaoEl = document.getElementById('pontuacao');
  const status = document.getElementById('status');

  const gabarito = {
    q1: "TLS",
    q2: "IP",
    q3: "Senha",
    q4: "Reportar"
  };

  let current = 0;
  let tempo = 60;

  function mostrarEtapa(i) {
    steps.forEach((step, index) => {
      step.style.display = index === i ? 'block' : 'none';
    });
    progressBar.style.width = ((i + 1) / steps.length) * 100 + "%";
  }

  function coletarRespostas() {
    let pontos = 0;
    for (let q in gabarito) {
      const marcada = document.querySelector(`input[name="${q}"]:checked`);
      if (marcada && marcada.value === gabarito[q]) {
        pontos++;
      }
    }
    return pontos;
  }

  document.querySelectorAll('.next').forEach(btn => {
    btn.addEventListener('click', () => {
      if (current < steps.length - 1) {
        current++;
        mostrarEtapa(current);
      }
    });
  });

  document.querySelectorAll('.prev').forEach(btn => {
    btn.addEventListener('click', () => {
      if (current > 0) {
        current--;
        mostrarEtapa(current);
      }
    });
  });

  document.getElementById('finalizar').addEventListener('click', () => {
    clearInterval(timer);
    const pontos = coletarRespostas();
    pontuacaoEl.textContent = `Pontuação final: ${pontos} de ${Object.keys(gabarito).length}`;
    resultado.style.display = 'block';
  });

  const timer = setInterval(() => {
    tempo--;
    timeEl.textContent = tempo;
    if (tempo <= 0) {
      clearInterval(timer);
      alert("Tempo esgotado!");
    }
  }, 1000);

  document.getElementById('email-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const nome = document.getElementById('nome').value;
    const email = document.getElementById('email').value;
    const pontos = coletarRespostas();

    emailjs.send('service_h21ez1j', ' SEU_TEMPLATE_ID', {
      nome_usuario: nome,
      email_usuario: email,
      pontuacao_final: pontos
    })
    .then(() => {
      status.textContent = "Resultado enviado com sucesso!";
      status.style.color = "lime";
    })
    .catch(() => {
      status.textContent = "Erro ao enviar.";
      status.style.color = "red";
    });
  });

  mostrarEtapa(0);

});
</script>

</body>
</html>
