<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste de Talento em Tecnologia | Cyber-Nexis</title>

  <link rel="stylesheet" href="Styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo-cyber">
      <img src="Imagem/Logotipo.jpg" alt="Logotipo Cyber-Nexis">
    </div>
  </div>
</header>

<main class="container quiz-container">

  <section class="section">

    <h1 class="quiz-main-title">Teste seu talento em tecnologia</h1>

    <!-- Barra -->
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- Timer -->
    <div id="timer" class="timer">
      Tempo restante: <span id="time">--</span> segundos
    </div>

    <form id="quiz-form">

      <!-- ETAPA 1 -->
      <div class="step" id="step1">
        <h2 class="quiz-step-title">ETAPA 01</h2>

        <div class="question-block">
          <p class="quiz-question">1) Quando você acessa um site HTTPS, o que garante a criptografia?</p>
          <label><input type="radio" name="q1" value="DNS"> DNS</label>
          <label><input type="radio" name="q1" value="TLS"> TLS + Certificado Digital</label>
          <label><input type="radio" name="q1" value="Firewall"> Firewall</label>
          <label><input type="radio" name="q1" value="Roteador"> Roteador</label>
        </div>

        <div class="question-block">
          <p class="quiz-question">2) O que ocorre primeiro ao acessar um domínio?</p>
          <label><input type="radio" name="q2" value="IP"> Resolução DNS</label>
          <label><input type="radio" name="q2" value="HTML"> Download HTML</label>
          <label><input type="radio" name="q2" value="Firewall"> Validação Firewall</label>
          <label><input type="radio" name="q2" value="Ping"> Ping automático</label>
        </div>

        <button type="button" class="quiz-btn next-step">Próximo</button>
      </div>

      <!-- ETAPA 2 -->
      <div class="step" id="step2" style="display:none;">
        <h2 class="quiz-step-title">ETAPA 02</h2>

        <div class="question-block">
          <p class="quiz-question">3) O que caracteriza força bruta?</p>
          <label><input type="radio" name="q3" value="ZeroDay"> Zero Day</label>
          <label><input type="radio" name="q3" value="Senha"> Tentativas massivas de senha</label>
          <label><input type="radio" name="q3" value="Fisico"> Ataque físico</label>
          <label><input type="radio" name="q3" value="Malware"> Malware automático</label>
        </div>

        <button type="button" class="quiz-btn prev-step">Voltar</button>
        <button type="button" class="quiz-btn next-step">Próximo</button>
      </div>

      <!-- ETAPA FINAL -->
      <div class="step" id="step3" style="display:none;">
        <h2 class="quiz-step-title">ETAPA FINAL</h2>

        <div class="question-block">
          <p class="quiz-question">4) Vulnerabilidade descoberta. Ação correta?</p>
          <label><input type="radio" name="q4" value="Explorar"> Explorar</label>
          <label><input type="radio" name="q4" value="Publicar"> Publicar</label>
          <label><input type="radio" name="q4" value="Reportar"> Reportar responsável</label>
          <label><input type="radio" name="q4" value="Ignorar"> Ignorar</label>
        </div>

        <button type="button" class="quiz-btn prev-step">Voltar</button>
        <button type="button" class="quiz-btn" id="finalizar-btn">Finalizar</button>
      </div>

    </form>

  </section>

</main>

<script type="module" src="js/testeQuiz.js"></script>

</body>
</html>
