<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contato | Cyber-Nexis</title>
  <meta name="description" content="Entre em contato com a Cyber-Nexis.">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" defer></script>
  <script src="particles-config.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js" defer></script>
  <script type="module">
    import { bindLogoutButton } from "./site.js";
    bindLogoutButton("logout");
  </script>
</head>
<body>
  <div id="particles-js" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">CN</span>
        <span><span class="brand-name">Cyber-Nexis</span><span class="brand-subtitle">Contato</span></span>
      </a>
      <nav class="nav-links" aria-label="Navegação principal">
        <a href="index.html">Início</a>
        <a href="chat.html">Chat</a>
        <a href="manual.html">Manual</a>
        <a href="contato.html" aria-current="page">Contato</a>
        <button id="logout" type="button">Sair</button>
      </nav>
    </div>
  </header>

  <main class="container section contact-grid">
    <section class="panel">
      <span class="kicker">Canal oficial</span>
      <h1>Contato</h1>
      <p>Use este formulário para dúvidas, feedback ou solicitação de acesso. O envio via EmailJS exige configurar suas chaves em <code>contato.js</code>.</p>
    </section>

    <section class="panel" aria-labelledby="contact-title">
      <h2 id="contact-title">Enviar mensagem</h2>
      <form id="contact-form" class="form" novalidate>
        <div class="field">
          <label for="nome">Nome</label>
          <input id="nome" name="nome" type="text" required minlength="3" placeholder="Seu nome">
        </div>
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" required placeholder="voce@email.com">
        </div>
        <div class="field">
          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem" name="mensagem" required minlength="10" placeholder="Digite sua mensagem"></textarea>
        </div>
        <input id="hp-field" name="hp-field" type="text" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px">
        <button class="btn" type="submit">Enviar mensagem</button>
        <div id="resposta" class="status-message" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script src="contato.js" defer></script>
</body>
</html>
