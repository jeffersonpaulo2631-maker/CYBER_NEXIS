<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Cadastro • CyberNexis</title>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="particles-config.js" defer></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

.container{
background:#111;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
z-index:1;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#222;
border:none;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:red;
border:none;
color:white;
cursor:pointer;
}

.secondary{
background:#333;
}

#feedback{
margin-top:15px;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<h2>Criar Conta</h2>

<input id="email" type="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button id="btnRegister">Registrar</button>

<button class="secondary" onclick="window.location.href='login.html'">
Voltar
</button>

<p id="feedback"></p>

</div>

<script type="module">

import { register } from "./site.js";

const btnRegister = document.getElementById("btnRegister");
const feedback = document.getElementById("feedback");

const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");

function executarRegistro(){

const email = emailInput.value.trim();
const senha = senhaInput.value.trim();

if(!email || !senha){
feedback.innerText = "Preencha todos os campos.";
return;
}

btnRegister.disabled = true;
btnRegister.innerText = "Criando conta...";

register(email, senha)
.then(() => {
window.location.href = "index.html";
})
.catch(error => {
feedback.innerText = error.message;
btnRegister.disabled = false;
btnRegister.innerText = "Registrar";
});

}

btnRegister.addEventListener("click", executarRegistro);

document.addEventListener("keydown", (e) => {
if(e.key === "Enter"){
executarRegistro();
}
});

</script>

</body>
</html>
