<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acesso Restrito | Cyber-Nexis</title>
  <meta name="description" content="Login restrito da Cyber-Nexis.">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" defer></script>
  <script src="particles-config.js" defer></script>
</head>
<body class="auth-page">
  <div id="particles-js" aria-hidden="true"></div>

  <main class="auth-card panel" aria-labelledby="login-title">
    <span class="kicker">Acesso restrito</span>
    <h1 id="login-title">Cyber-Nexis</h1>
    <p>Entre com e-mail e senha, crie uma conta ou use acesso anônimo para testar o sistema.</p>

    <form id="login-form" class="form" novalidate>
      <div class="field">
        <label for="name">Codinome</label>
        <input id="name" name="name" type="text" autocomplete="nickname" placeholder="Operador" maxlength="30">
      </div>

      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="voce@email.com">
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="mínimo 6 caracteres">
      </div>

      <button class="btn" type="submit" data-action="login">Entrar</button>
      <button class="btn secondary" type="button" id="register-button">Criar conta</button>
      <button class="secondary-link" type="button" id="anonymous-button">Entrar como visitante</button>
      <a class="secondary-link" href="index.html">Voltar ao início</a>
      <div id="auth-status" class="status-message" role="status" aria-live="polite"></div>
    </form>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
