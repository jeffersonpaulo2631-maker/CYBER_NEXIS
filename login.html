<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Acesso Restrito — Cyber-Nexis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="Styles.css">
</head>
<body>

<main class="container">
  <section class="section">
    <h2>ACESSO RESTRITO</h2>
    <p>Identificação necessária para prosseguir.</p>

    <input type="email" id="email" placeholder="Email operacional" required>
    <input type="password" id="senha" placeholder="Código de acesso" required>

    <div class="form-actions">
      <button id="btnLogin">Entrar</button>
      <button onclick="window.location.href='registrer.html'" class="secondary">
        Registrar
      </button>
    </div>

    <p id="feedback"></p>
  </section>
</main>

<script type="module">
  import { login } from "./js/site.js";

  const btnLogin = document.getElementById("btnLogin");
  const feedback = document.getElementById("feedback");

  btnLogin.addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    if (!email || !senha) {
      feedback.innerText = "Preencha todos os campos.";
      return;
    }

    try {
      await login(email, senha);
      window.location.href = "index.html";
    } catch (error) {
      feedback.innerText = error.message;
    }
  });
</script>
</body>
</html>
