<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Acesso Restrito • CyberNexis</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:black;
color:white;
font-family:Arial;
}

.container{
background:#111;
padding:40px;
border-radius:10px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#222;
border:none;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:red;
border:none;
color:white;
cursor:pointer;
}

.secondary{
background:#333;
}

#feedback{
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h2>Acesso Restrito</h2>

<input id="email" type="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button id="btnLogin">Entrar</button>

<button class="secondary" onclick="window.location.href='registre.html'">
Registrar
</button>

<p id="feedback"></p>

</div>

<script type="module">

import { login } from "./site.js";

const btnLogin = document.getElementById("btnLogin");
const feedback = document.getElementById("feedback");

btnLogin.addEventListener("click", async () => {

const email = document.getElementById("email").value.trim();
const senha = document.getElementById("senha").value.trim();

try{

await login(email, senha);

window.location.href="index.html";

}catch(error){

feedback.innerText = error.message;

}

});

document.addEventListener("keypress", e=>{
if(e.key === "Enter") btnLogin.click();
});

</script>

</body>
</html>
