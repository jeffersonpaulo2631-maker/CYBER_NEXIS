<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat Restrito | Cyber-Nexis</title>
  <meta name="description" content="Chat Cyber-Nexis com sala pública e salas privadas por chave.">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" defer></script>
  <script src="particles-config.js" defer></script>
  <script type="module">
    import { bindLogoutButton, protectPage } from "./site.js";
    protectPage("login.html");
    bindLogoutButton("logout");
  </script>
</head>
<body>
  <div id="particles-js" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">CN</span>
        <span><span class="brand-name">Cyber-Nexis</span><span class="brand-subtitle">Chat restrito</span></span>
      </a>
      <nav class="nav-links" aria-label="Navegação principal">
        <a href="index.html">Início</a>
        <a href="chat.html" aria-current="page">Chat</a>
        <a href="contato.html">Contato</a>
        <button id="logout" type="button">Sair</button>
      </nav>
    </div>
  </header>

  <main class="container chat-shell">
    <section class="chat-panel panel" aria-labelledby="chat-title">
      <div class="chat-head">
        <div>
          <h2 id="chat-title" style="margin:0">Canal Cyber-Nexis</h2>
          <span id="room-tag" class="badge">Sala: pública</span>
        </div>
        <div>
          <span id="message-count" class="badge">Mensagens: 0</span>
        </div>
      </div>

      <div id="messages" class="messages" aria-live="polite">
        <div class="empty-state">Nenhuma transmissão ainda. O canal está em silêncio.</div>
      </div>

      <form id="message-form" class="composer" autocomplete="off">
        <button id="attach-button" class="icon-btn" type="button" title="Anexar imagem" aria-label="Anexar imagem">＋</button>
        <input id="file-input" class="file-input" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
        <label class="sr-only" for="message-input">Mensagem</label>
        <textarea id="message-input" placeholder="Digite sua mensagem... Shift + Enter quebra linha"></textarea>
        <button id="send-button" class="send-btn" type="submit">Enviar</button>
      </form>
    </section>

    <aside class="side-panel panel" aria-labelledby="settings-title">
      <h2 id="settings-title">Operação</h2>

      <div class="field">
        <label for="codinome">Codinome</label>
        <input id="codinome" type="text" maxlength="30" placeholder="Anônimo">
      </div>

      <div class="field">
        <label for="avatar-select">Avatar</label>
        <select id="avatar-select">
          <option value="CN">CN</option>
          <option value="Δ">Δ</option>
          <option value="⌬">⌬</option>
          <option value="01">01</option>
        </select>
      </div>

      <div class="field">
        <label for="room-pass">Chave de sala privada</label>
        <input id="room-pass" type="password" placeholder="vazio = sala pública">
      </div>

      <button id="enter-room" class="btn" type="button">Entrar na sala</button>
      <p id="chat-status" class="status-message">Conectando...</p>
      <p id="participant-count" class="badge">Pessoas: 1</p>
    </aside>
  </main>

  <script type="module" src="chat.js"></script>
</body>
</html>
